<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nestrix</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- Site Title -->
  <header>
    <h1 id="site-title">Site Name</h1>
  </header>

  <!-- Current Projects Section -->
  <div class="container" id="project-list-container">
    <h2>Current Projects</h2>
    <ul id="project-list" class="project-list"></ul>
  </div>

  <!-- Contact Section -->
  <div class="container" id="contact-section">
    <h2>Contact</h2>
    <!-- Contact info will be added here by JS -->
  </div>

  <!-- Newsletter Section -->
  <div class="container" id="newsletter-section">
    <h2>Subscribe to Our Newsletter</h2>
    <iframe
      scrolling="no"
      style="width:100%; height:220px; border:1px #ccc solid;"
      src="https://buttondown.com/nestrix?as_embed=true"
      title="Newsletter Signup"
    ></iframe>
  </div>

  <footer>
    <p>Nestrix</p>
  </footer>

  <script src="js/scripts.js"></script>
</body>
</html>
